name: 👻 Ghost Scouter Sweep

on:
  schedule:
    # 9:00 AM IST = 03:30 UTC daily
    - cron: "30 3 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ghost-sweep:
    name: Run Ghost Sweep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Ghost Scouter
        env:
          # Handle both standard and NEXT_PUBLIC variations just in case
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GOOGLE_AI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx src/scripts/ghost-runner.ts
